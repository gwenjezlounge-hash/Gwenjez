<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

                extend: {

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <!-- Recharts via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js">
    </script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js">
    </script>
    <script src="https://unpkg.com/prop-types/prop-types.min.js">

    <script src="https://unpkg.com/recharts/umd/Recharts.js">

    <style>
        :root {
            --scrollbar-thumb: #2a2a3a;
            --scrollbar-track: #1a1a23;
        }
        * {
            scrollbar-width: thin;
            scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3a3a4a;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0a0a10;
            color: #e2e8f0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .recharts-cartesian-grid-horizontal line,
        .recharts-cartesian-grid-vertical line {
            stroke: #2a2a3a;
            stroke-opacity: 0.6;
        }
        .recharts-text {
            fill: #94a3b8;
            font-size: 11px;
            font-family: 'Inter', system-ui, sans-serif;
        }
        .recharts-tooltip-wrapper .recharts-default-tooltip {
            background: #1a1a23 !important;
            border: 1px solid #2a2a3a !important;
            border-radius: 10px !important;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5) !important;
            padding: 10px 14px !important;
        }
        .recharts-default-tooltip .recharts-tooltip-label {
            color: #e2e8f0 !important;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .recharts-default-tooltip .recharts-tooltip-item {
            color: #cbd5e1 !important;
            padding: 2px 0 !important;
        }
        .recharts-legend-item-text {
            color: #94a3b8 !important;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes pulseGlow {
            0%,
            100% {
                box-shadow: 0 0 12px rgba(212, 168, 83, 0.3);
            }
            50% {
                box-shadow: 0 0 28px rgba(212, 168, 83, 0.6);
            }
        }
        .animate-fade-in {
            animation: fadeInUp 0.5s ease-out forwards;
        }
        .animate-glow {
            animation: pulseGlow 2.5s ease-in-out infinite;
        }
        .card-hover {
            transition: all 0.25s ease;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            border-color: #3a3a4a;
        }
        .sidebar-link {
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }
        .sidebar-link:hover {
            background: #1e1e2a;
            border-left-color: #d4a853;
        }
        .sidebar-link.active {
            background: #1e1e2a;
            border-left-color: #d4a853;
            color: #d4a853;
        }
        @media (max-width: 768px) {
            .sidebar-overlay {
                transition: opacity 0.3s ease;
            }
        }
    </style>
</head>
<body class="bg-[#0a0a10] min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;
        const {

        // ──────────────────────────────────────

            { id: 2, name: 'Mercy Wanjiku', role: 'Waitress', shift: 'Evening', sales: 128500, orders: 203, rating: 4.9,
                status: 'active' },
            { id: 3, name: 'James Kiprotich', role: 'Bartender', shift: 'Night', sales: 165000, orders: 220, rating: 4.7,
                status: 'active' },
            { id: 4, name: 'Faith Njeri', role: 'Waitress', shift: 'Evening', sales: 98000, orders: 156, rating: 4.5,
                status: 'active' },
            { id: 5, name: 'Kevin Mwangi', role: 'Bartender', shift: 'Night', sales: 89000, orders: 134, rating: 4.3,

            { id: 6, name: 'Amina Hassan', role: 'Waitress', shift: 'Morning', sales: 45000, orders: 72, rating: 4.6,

            { name: 'Hennessy VS', type: 'Cognac', current: 1, min: 4, unit: 'bottles', supplier: 'Pernod Ricard KE' },
            { name: 'Tusker Keg 50L', type: 'Keg', current: 1, min: 3, unit: 'kegs', supplier: 'EABL Nairobi' },
            { name: 'Shisha Flavor - Mint', type: 'Shisha', current: 3, min: 10, unit: 'packs', supplier: 'Shisha Spot KE' },
        ];

        const recentTransactions = [
            { id: 'TX-1042', time: '11:42 PM', customer: 'Walk-in Group (4)', items: '4x Tusker, 2x Jameson shots',
                amount: 8600, method: 'M-Pesa', waiter: 'Mercy W.' },
            { id: 'TX-1041', time: '11:28 PM', customer: 'VIP Booth 3', items: 'Hennessy VS bottle, mixers',
                amount: 18500, method: 'Card', waiter: 'Brian O.' },
            { id: 'TX-1040', time: '11:15 PM', customer: 'Table 12', items: '6x White Cap, platter', amount: 7200,
                method: 'Cash', waiter: 'Faith N.' },
            { id: 'TX-1039', time: '10:58 PM', customer: 'Bar Counter', items: '2x Guinness, 1x Smirnoff', amount: 3400,
                method: 'M-Pesa', waiter: 'James K.' },
            { id: 'TX-1038', time: '10:40 PM', customer: 'Group Booking (8)', items: '8x Tusker, 4x cocktails',

        ];

        const topSellingDrinks = [

            { name: 'White Cap', sales: 180, percentage: 21 },
            { name: 'Jameson', sales: 145, percentage: 17 },
            { name: 'Guinness', sales: 110, percentage: 13 },

        // ──────────────────────────────────────
        // ICON COMPONENTS (Inline SVG)
        // ──────────────────────────────────────
        const Icons = {

        // ──────────────────────────────────────

        // ──────────────────────────────────────

                </div>
            </div>
            <div className="text-xl sm:text-2xl lg:text-3xl font-bold text-white tracking-tight">{value}</div>

                    <span className="flex items-center gap-1 text-xs font-semibold text-emerald-400 bg-emerald-400/10 px-2 py-0.5 rounded-full">

                    <span className="flex items-center gap-1 text-xs font-semibold text-rose-400 bg-rose-400/10 px-2 py-0.5 rounded-full">

                    <span className="text-xs font-medium text-gray-500">{change}</span>

                    {/* Low Stock Alerts */}

                            <span className="text-rose-400"><Icons.Alert /></span>

                            <span className="ml-auto text-xs bg-rose-500/20 text-rose-400 px-2 py-0.5 rounded-full font-semibold">

                            </span>
                        </div>
                        <div className="space-y-3">
                            {lowStockItems.map((item, i) => (
                                <div key={i}
                                    className="flex items-center gap-3 p-3 bg-surface-hover rounded-lg border border-surface-border/50">
                                    <div className="flex-1 min-w-0">
                                        <p className="text-sm font-medium text-white truncate">{item.name}</p>
                                        <p className="text-xs text-gray-500">{item.type} · {item.supplier}</p>
                                    </div>
                                    <div className="text-right flex-shrink-0">
                                        <p className="text-sm font-bold text-rose-400">{item.current} left</p>
                                        <p className="text-xs text-gray-500">min {item.min}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <button className="w-full mt-4 text-xs font-semibold text-accent-gold bg-accent-gold/10 hover:bg-accent-gold/20 py-2 rounded-lg transition-all">
                            Reorder All → Supplier Portal
                        </button>
                    </div>
                </div>

                {/* Third Row: Staff Table + Transactions */}
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 sm:gap-5">
                    {/* Staff Productivity */}
                    <div className="card-hover bg-surface-card border border-surface-border rounded-xl p-4 sm:p-5 overflow-hidden">
                        <h3 className="text-sm font-semibold text-white uppercase tracking-wide mb-3">Staff Productivity</h3>
                        <div className="overflow-x-auto -mx-4 sm:-mx-5">
                            <table className="w-full text-sm min-w-[500px]">
                                <thead>
                                    <tr className="text-xs text-gray-500 uppercase border-b border-surface-border">
                                        <th className="text-left py-3 px-4 font-medium">Staff</th>
                                        <th className="text-left py-3 px-4 font-medium">Role</th>
                                        <th className="text-right py-3 px-4 font-medium">Sales</th>
                                        <th className="text-right py-3 px-4 font-medium">Orders</th>
                                        <th className="text-center py-3 px-4 font-medium">Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {staffData.map((s) => (
                                        <tr key={s.id}
                                            className="border-b border-surface-border/40 hover:bg-surface-hover/50 transition-colors">
                                            <td className="py-3 px-4">
                                                <p className="font-medium text-white">{s.name}</p>
                                                <p className="text-xs text-gray-500">{s.shift} shift</p>
                                            </td>
                                            <td className="py-3 px-4 text-gray-400">{s.role}</td>
                                            <td className="py-3 px-4 text-right font-mono text-white font-medium">
                                                {formatCurrency(s.sales)}
                                            </td>
                                            <td className="py-3 px-4 text-right text-gray-400">{s.orders}</td>
                                            <td className="py-3 px-4 text-center">
                                                <span className={`inline-flex items-center gap-1 text-xs font-semibold px-2 py-1 rounded-full ${
                                                    s.status === 'active'
                                                        ? 'bg-emerald-500/15 text-emerald-400'
                                                        : 'bg-amber-500/15 text-amber-400'
                                                }`}>
                                                    <span className={`w-1.5 h-1.5 rounded-full ${
                                                        s.status === 'active' ? 'bg-emerald-400' : 'bg-amber-400'
                                                    }`}></span>
                                                    {s.status}
                                                </span>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Recent Transactions */}
                    <div className="card-hover bg-surface-card border border-surface-border rounded-xl p-4 sm:p-5 overflow-hidden">
                        <div className="flex items-center justify-between mb-3">
                            <h3 className="text-sm font-semibold text-white uppercase tracking-wide">Recent Transactions</h3>
                            <span className="text-xs text-accent-gold cursor-pointer hover:underline">View All</span>
                        </div>
                        <div className="overflow-x-auto -mx-4 sm:-mx-5">
                            <table className="w-full text-sm min-w-[480px]">
                                <thead>
                                    <tr className="text-xs text-gray-500 uppercase border-b border-surface-border">
                                        <th className="text-left py-2 px-4 font-medium">ID</th>
                                        <th className="text-left py-2 px-4 font-medium">Details</th>
                                        <th className="text-right py-2 px-4 font-medium">Amount</th>
                                        <th className="text-center py-2 px-4 font-medium">Method</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {recentTransactions.map((tx, i) => (
                                        <tr key={i}
                                            className="border-b border-surface-border/30 hover:bg-surface-hover/50 transition-colors">
                                            <td className="py-2.5 px-4">
                                                <span className="text-xs font-mono text-gray-500">{tx.id}</span>
                                                <p className="text-xs text-gray-600">{tx.time}</p>
                                            </td>
                                            <td className="py-2.5 px-4">
                                                <p className="text-white text-xs font-medium truncate max-w-[140px]">{tx.customer}</p>
                                                <p className="text-xs text-gray-500 truncate max-w-[140px]">{tx.items}</p>
                                            </td>
                                            <td className="py-2.5 px-4 text-right font-mono text-white font-medium text-xs">
                                                {formatCurrency(tx.amount)}
                                            </td>
                                            <td className="py-2.5 px-4 text-center">
                                                <span className={`text-xs font-semibold px-2 py-0.5 rounded-full ${
                                                    tx.method === 'M-Pesa'
                                                        ? 'bg-green-500/15 text-green-400'
                                                        : tx.method === 'Card'
                                                        ? 'bg-blue-500/15 text-blue-400'
                                                        : 'bg-gray-500/15 text-gray-400'
                                                }`}>
                                                    {tx.method}
                                                </span>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                {/* Bottom: Weekly Revenue vs Expenses */}
                <div className="card-hover bg-surface-card border border-surface-border rounded-xl p-4 sm:p-5">
                    <div className="flex items-center justify-between mb-4">
                        <h3 className="text-sm font-semibold text-white uppercase tracking-wide">Weekly Revenue vs Expenses</h3>
                        <span className="text-xs text-gray-500 bg-surface-hover px-2 py-1 rounded-md">This Week</span>
                    </div>
                    <div className="h-64 sm:h-72">
                        <ResponsiveContainer width="100%" height="100%">
                            <LineChart data={weeklySalesData} margin={{ top: 5, right: 5, left: -10, bottom: 0 }}>
                                <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                <XAxis dataKey="day" tickLine={false} axisLine={false} />
                                <YAxis tickFormatter={(v) => `${(v / 1000).toFixed(0)}k`} tickLine={false}
                                axisLine={false} />
                                <Tooltip formatter={(val) => [formatCurrency(val), '']}
                                labelStyle={{ color: '#e2e8f0' }} />
                                <Legend wrapperStyle={{ fontSize: '12px', color: '#94a3b8' }} />
                                <Line type="monotone" dataKey="sales" stroke="#10b981" strokeWidth={2.5}
                                    dot={{ r: 4, fill: '#10b981', strokeWidth: 0 }} name="Revenue"
                                    activeDot={{ r: 7, stroke: '#1a1a23', strokeWidth: 3 }} />
                                <Line type="monotone" dataKey="expenses" stroke="#e11d48" strokeWidth={2.5}
                                    dot={{ r: 4, fill: '#e11d48', strokeWidth: 0 }} name="Expenses"
                                    activeDot={{ r: 7, stroke: '#1a1a23', strokeWidth: 3 }}
                                    strokeDasharray="6 3" />
                            </LineChart>
                        </ResponsiveContainer>
                    </div>
                </div>
            </div>
        );

        // ──────────────────────────────────────
        // PLACEHOLDER VIEWS
        // ──────────────────────────────────────
        const PlaceholderView = ({ title, description, icon }) => (
            <div className="flex flex-col items-center justify-center py-20 text-center animate-fade-in">
                <div className="p-6 rounded-full bg-surface-card border border-surface-border mb-6 text-accent-gold">
                    {icon}
                </div>
                <h2 className="text-xl sm:text-2xl font-bold text-white mb-2">{title}</h2>
                <p className="text-gray-400 max-w-md">{description}</p>
                <span className="mt-4 text-xs text-gray-600 bg-surface-card px-3 py-1 rounded-full border border-surface-border">
                    Phase 2 — Coming Soon
                </span>
            </div>
        );

        // ──────────────────────────────────────
        // MAIN APP
        // ──────────────────────────────────────
        const App = () => {
            const [activeView, setActiveView] = useState('dashboard');
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 10);
                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            // Close sidebar on route change (mobile)
            useEffect(() => {
                setSidebarOpen(false);
            }, [activeView]);

            // Close sidebar on resize to desktop
            useEffect(() => {
                const handleResize = () => {
                    if (window.innerWidth >= 1024) setSidebarOpen(false);
                };
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            const navItems = [
                { id: 'dashboard', label: 'Dashboard', icon: <Icons.Dashboard /> },
                { id: 'sales', label: 'Sales Tracking', icon: <Icons.Sales /> },
                { id: 'stock', label: 'Stock Management', icon: <Icons.Stock /> },
                { id: 'staff', label: 'Staff Productivity', icon: <Icons.Staff /> },
                { id: 'events', label: 'Event Analytics', icon: <Icons.Events /> },
                { id: 'customers', label: 'Customer Analytics', icon: <Icons.Customers /> },
            ];

            const renderView = () => {
                switch (activeView) {
                    case 'dashboard':
                        return <DashboardView />;
                    case 'sales':
                        return <PlaceholderView title="Sales Tracking" description="Full sales recording with shift reports, payment tracking, and export to PDF/Excel."
                            icon={<Icons.Sales />} />;
                    case 'stock':
                        return <PlaceholderView title="Stock Management" description="Kegs, bottles, shisha, and soft drinks — stock in/out, low alerts, wastage reports, and supplier records."
                            icon={<Icons.Stock />} />;
                    case 'staff':
                        return <PlaceholderView title="Staff Productivity" description="Waiter & bartender performance, attendance, commission calculations, and productivity rankings."
                            icon={<Icons.Staff />} />;
                    case 'events':
                        return <PlaceholderView title="Event Analytics" description="CCI Nights Out, UEFA Finals, Pasa Pasa Saturdays — attendance, revenue, peak hours per event."
                            icon={<Icons.Events />} />;
                    case 'customers':
                        return <PlaceholderView title="Customer Analytics" description="Returning customers, VIP tracking, group bookings, peak traffic hours, and loyalty system."
                            icon={<Icons.Customers />} />;
                    default:
                        return <DashboardView />;
                }
            };

            return (
                <div className="flex min-h-screen bg-[#0a0a10]">
                    {/* Mobile Overlay */}
                    {sidebarOpen && (
                        <div
                            className="fixed inset-0 bg-black/70 z-40 lg:hidden sidebar-overlay"
                            onClick={() => setSidebarOpen(false)}
                        />
                    )}

                    {/* Sidebar */}
                    <aside
                        className={`fixed lg:sticky top-0 left-0 z-50 h-screen w-64 bg-[#0d0d16] border-r border-surface-border flex flex-col transition-transform duration-300 ease-in-out ${
                            sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'
                        } lg:flex-shrink-0`}
                    >
                        {/* Logo */}
                        <div className="flex items-center gap-3 px-5 py-5 border-b border-surface-border">
                            <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-accent-gold to-amber-600 flex items-center justify-center flex-shrink-0 animate-glow">
                                <span className="text-white font-black text-lg">G</span>
                            </div>
                            <div>
                                <h1 className="text-white font-bold text-base leading-tight">Gwenjez</h1>
                                <span className="text-xs text-accent-gold font-semibold tracking-widest uppercase">Pulse</span>
                            </div>
                            <button
                                className="lg:hidden ml-auto text-gray-400 hover:text-white p-1"
                                onClick={() => setSidebarOpen(false)}
                            >
                                <Icons.Close />
                            </button>
                        </div>

                        {/* Navigation */}
                        <nav className="flex-1 py-4 overflow-y-auto">
                            <p className="text-xs text-gray-600 uppercase tracking-widest px-5 mb-3 font-semibold">Main Menu</p>
                            {navItems.map((item) => (
                                <button
                                    key={item.id}
                                    onClick={() => setActiveView(item.id)}
                                    className={`sidebar-link w-full flex items-center gap-3 px-5 py-3 text-sm font-medium transition-all ${
                                        activeView === item.id
                                            ? 'active text-accent-gold'
                                            : 'text-gray-400'
                                    }`}
                                >
                                    <span className="flex-shrink-0">{item.icon}</span>
                                    {item.label}
                                    {item.id === 'dashboard' && (
                                        <span className="ml-auto w-1.5 h-1.5 rounded-full bg-accent-gold animate-pulse"></span>
                                    )}
                                </button>
                            ))}
                        </nav>

                        {/* Footer */}
                        <div className="px-5 py-4 border-t border-surface-border">
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 rounded-full bg-gradient-to-br from-accent-sky to-blue-700 flex items-center justify-center text-xs font-bold text-white">
                                    A
                                </div>
                                <div className="flex-1 min-w-0">
                                    <p className="text-xs font-medium text-white truncate">Admin User</p>
                                    <p className="text-xs text-gray-500">admin@gwenjez.co.ke</p>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <div className="flex-1 flex flex-col min-w-0">
                        {/* Top Header */}
                        <header
                            className={`sticky top-0 z-30 bg-[#0a0a10]/90 backdrop-blur-md border-b border-surface-border px-4 sm:px-6 py-3 flex items-center gap-3 transition-shadow ${
                                scrolled ? 'shadow-lg shadow-black/20' : ''
                            }`}
                        >
                            <button
                                className="lg:hidden text-gray-400 hover:text-white p-1.5 rounded-lg hover:bg-surface-hover transition-colors"
                                onClick={() => setSidebarOpen(true)}
                            >
                                <Icons.Menu />
                            </button>
                            <div className="flex-1">
                                <p className="text-sm font-semibold text-white">
                                    {navItems.find((n) => n.id === activeView)?.label || 'Dashboard'}
                                </p>
                                <p className="text-xs text-gray-500">
                                    {new Date().toLocaleDateString('en-KE', { weekday: 'long', day: 'numeric', month: 'long',
                                        year: 'numeric' })}
                                </p>
                            </div>
                            <button className="relative p-2 text-gray-400 hover:text-white hover:bg-surface-hover rounded-lg transition-colors">
                                <Icons.Bell />
                                <span className="absolute top-1 right-1 w-2 h-2 bg-rose-500 rounded-full animate-pulse"></span>
                            </button>
                            <span className="hidden sm:inline text-xs text-gray-500 bg-surface-card px-2 py-1 rounded-md border border-surface-border">
                                v1.0 — Phase 1
                            </span>
                        </header>

                        {/* Page Content */}
                        <main className="flex-1 p-4 sm:p-6 lg:p-8 overflow-x-hidden">
                            {renderView()}
                        </main>

                        {/* Bottom Status Bar */}
                        <footer className="bg-[#0d0d16] border-t border-surface-border px-4 sm:px-6 py-2.5 flex flex-wrap items-center justify-between text-xs text-gray-500 gap-2">
                            <span>© 2026 Gwenjez Pulse · Gwenjez Lounge Mombasa</span>
                            <span className="flex items-center gap-1.5">
                                <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
                                System Online · Last sync: {new Date().toLocaleTimeString('en-KE', { hour: '2-digit',
                                    minute: '2-digit' })}
                            </span>
                        </footer>
                    </div>
                </div>
            );
        };

        // ──────────────────────────────────────
        // RENDER
        // ──────────────────────────────────────
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
